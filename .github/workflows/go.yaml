name: Go Build and Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com)

      - name: Set up Go
        uses: [actions/setup-go@v5](https://github.com/actions/setup-go)
        with:
          go-version: '1.25.8' # Or use 'go-version-file: "go.mod"'

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
